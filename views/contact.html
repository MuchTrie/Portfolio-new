<!-- ========== CONTACT SECTION ========== -->
<section id="contact" class="section contact">
  <div class="container">
    <div class="section-header reveal">
      <p class="section-label">Let's connect</p>
      <h2 class="section-title">Contact <span class="text-red">Me</span></h2>
    </div>

    <div class="contact-grid">

      <!-- Left: Info cards -->
      <div class="contact-info reveal">
        <p class="contact-desc">
          Have a project, an opportunity, or just want to chat? Feel free to reach out —
          I'm always open for a good conversation.
        </p>
        <div class="contact-cards">
          <div class="contact-card">
            <div class="contact-icon"><i class="fas fa-envelope"></i></div>
            <div>
              <span class="contact-label">Email</span>
              <a href="mailto:much.trie@mhs.itenas.ac.id" class="contact-value">much.trie@mhs.itenas.ac.id</a>
            </div>
          </div>
          <div class="contact-card">
            <div class="contact-icon"><i class="fab fa-linkedin"></i></div>
            <div>
              <span class="contact-label">LinkedIn</span>
              <a href="https://linkedin.com/in/muchtrieha" target="_blank" rel="noopener"
                class="contact-value">linkedin.com/in/muchtrieha</a>
            </div>
          </div>
          <div class="contact-card">
            <div class="contact-icon"><i class="fab fa-github"></i></div>
            <div>
              <span class="contact-label">GitHub</span>
              <a href="https://github.com/MuchTrie" target="_blank" rel="noopener"
                class="contact-value">github.com/MuchTrie</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Form -->
      <form class="contact-form reveal" id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Your full name" required autocomplete="name" />
          <span class="field-error" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required autocomplete="email" />
          <span class="field-error" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" placeholder="What's it about?" required />
          <span class="field-error" id="subject-error"></span>
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
          <span class="field-error" id="message-error"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          <i class="fas fa-paper-plane"></i> Send Message
        </button>
        <div class="form-success" id="form-success" hidden>
          <i class="fas fa-check-circle"></i> Message sent! I'll get back to you soon.
        </div>
      </form>

    </div>
  </div>
</section>
